<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>拆解</title>
<style>
:root {
  --bg: #0c0c10;
  --surface: #13131c;
  --surface2: #1a1a26;
  --border: #1e1e2e;
  --border2: #2a2a3e;
  --text: #e2e2f0;
  --muted: #5a5a7a;
  --dim: #232335;
  --accent: #4ade80;
  --accent2: #7c6fff;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  min-height:100dvh;display:flex;flex-direction:column;
}

/* HEADER */
header{
  padding:11px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  position:sticky;top:0;background:var(--bg);z-index:20;
}
.logo{font-family:'Courier New',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.add-btn{
  margin-left:auto;width:32px;height:32px;background:var(--accent2);
  border:none;border-radius:8px;color:#fff;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;line-height:1;
}
.add-btn:hover{opacity:.8}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:12px 16px 80px}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:var(--border)}

/* EMPTY */
#empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--muted);font-size:12px;text-align:center;
  padding:60px 32px;line-height:1.8;
}
.empty-icon{font-size:32px;opacity:.25}

/* PROJECT CARD */
.project{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;margin-bottom:12px;overflow:hidden;
}
.project-head{
  padding:13px 14px 11px;display:flex;align-items:flex-start;gap:10px;
  cursor:pointer;
}
.project-info{flex:1;min-width:0}
.project-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px}
.project-meta{display:flex;align-items:center;gap:8px}
.project-progress{
  font-size:10px;font-family:'Courier New',monospace;color:var(--muted);
}
.progress-bar{
  flex:1;height:3px;background:var(--dim);border-radius:2px;overflow:hidden;max-width:80px;
}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.project-chevron{
  font-size:12px;color:var(--muted);flex-shrink:0;margin-top:2px;
  transition:transform .2s;
}
.project.open .project-chevron{transform:rotate(90deg)}
.project-actions{
  display:flex;gap:6px;margin-top:6px;
}
.proj-action-btn{
  font-size:9px;font-family:'Courier New',monospace;letter-spacing:.05em;
  background:none;border:1px solid var(--border);color:var(--muted);
  padding:3px 9px;border-radius:6px;cursor:pointer;
  transition:border-color .15s,color .15s;
}
.proj-action-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.proj-action-btn.danger:hover{border-color:var(--red);color:var(--red)}

/* STEPS */
.steps-wrap{display:none;border-top:1px solid var(--border)}
.project.open .steps-wrap{display:block}

.step-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;border-bottom:1px solid var(--dim);
  transition:background .1s;
}
.step-item:last-child{border-bottom:none}
.step-item.done{opacity:.45}

.step-check{
  width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);
  flex-shrink:0;margin-top:1px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.step-item.done .step-check{background:var(--accent);border-color:var(--accent)}
.check-icon{display:none;color:#0c0c10;font-size:11px;font-weight:700}
.step-item.done .check-icon{display:block}

.step-body{flex:1;min-width:0}
.step-text{font-size:13px;color:var(--text);line-height:1.55;margin-bottom:2px}
.step-item.done .step-text{text-decoration:line-through;color:var(--muted)}
.step-note{font-size:11.5px;color:var(--muted);line-height:1.5}
.step-num{
  font-size:9px;font-family:'Courier New',monospace;color:var(--dim);
  flex-shrink:0;margin-top:3px;
}

/* LOADING STATE */
.steps-loading{
  display:flex;align-items:center;gap:8px;
  padding:14px;font-size:11px;color:var(--muted);
  font-family:'Courier New',monospace;letter-spacing:.06em;
}
.spin{
  width:10px;height:10px;border:1.5px solid var(--dim);
  border-top-color:var(--accent2);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ADD PANEL */
#add-panel{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  z-index:30;padding:0 0 24px;
}
#add-panel.open{transform:translateY(0)}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 12px;cursor:pointer}
.panel-title{font-size:11px;font-family:'Courier New',monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:0 16px 10px}

.task-list-input{padding:0 16px;display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto}
.task-row{display:flex;gap:6px;align-items:flex-start}
.task-row-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;font-size:13.5px;color:var(--text);
  font-family:inherit;outline:none;resize:none;line-height:1.5;min-height:42px;
  transition:border-color .15s;
}
.task-row-input:focus{border-color:var(--accent2)}
.task-row-input::placeholder{color:var(--muted)}
.remove-task-btn{
  width:32px;height:32px;background:none;border:1px solid var(--border);
  color:var(--muted);border-radius:8px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:5px;
  transition:border-color .15s,color .15s;
}
.remove-task-btn:hover{border-color:var(--red);color:var(--red)}

.panel-footer{padding:12px 16px 0;display:flex;gap:8px}
.btn-add-task{
  background:none;border:1px dashed var(--border2);color:var(--muted);
  border-radius:9px;padding:9px 14px;font-size:12px;cursor:pointer;
  font-family:inherit;transition:border-color .15s,color .15s;
}
.btn-add-task:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-plan{
  flex:1;background:var(--accent2);color:#fff;border:none;
  border-radius:9px;padding:10px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:opacity .15s;opacity:.4;
}
.btn-plan.ready{opacity:1}

/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:25;display:none}
#overlay.visible{display:block}

/* TOAST */
#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:7px 14px;font-size:12px;color:var(--text);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:50;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <span class="logo">拆解</span>
  <button class="add-btn" onclick="openPanel()" title="添加任务">+</button>
</header>

<div id="main">
  <div id="empty">
    <div class="empty-icon">⊡</div>
    <div>点右上角 + 添加任务<br>可以一次加多个，AI帮你逐一拆步骤</div>
  </div>
  <div id="projects"></div>
</div>

<div id="overlay" onclick="closePanel()"></div>

<div id="add-panel">
  <div class="panel-handle" onclick="closePanel()"></div>
  <div class="panel-title">添加任务</div>
  <div class="task-list-input" id="task-inputs"></div>
  <div class="panel-footer">
    <button class="btn-add-task" onclick="addTaskRow()">+ 再加一个</button>
    <button class="btn-plan" id="btn-plan" onclick="planAll()" disabled>拆解全部</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let projects = []; // { id, name, steps:[{text,note,done}], createdAt }

// ── STORAGE ───────────────────────────────────────────────────────────────────
async function save(){
  try{ await window.storage.set('planner_projects', JSON.stringify(projects)); }catch(e){}
}
async function load(){
  try{
    const r = await window.storage.get('planner_projects');
    if(r) projects = JSON.parse(r.value);
  }catch(e){ projects=[]; }
  render();
}

// ── PANEL ─────────────────────────────────────────────────────────────────────
function openPanel(){
  document.getElementById('task-inputs').innerHTML='';
  addTaskRow();
  document.getElementById('add-panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
  setTimeout(()=>document.querySelector('.task-row-input')?.focus(),300);
}
function closePanel(){
  document.getElementById('add-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

function addTaskRow(){
  const wrap = document.getElementById('task-inputs');
  const row = document.createElement('div');
  row.className='task-row';
  const idx = wrap.children.length;
  row.innerHTML=`
    <textarea class="task-row-input" placeholder="任务 ${idx+1}…" rows="1"
      oninput="onTaskRowInput(this)" onkeydown="handleRowKey(event,this)"></textarea>
    <button class="remove-task-btn" onclick="removeTaskRow(this)">×</button>
  `;
  wrap.appendChild(row);
  row.querySelector('textarea').focus();
  checkPlanReady();
}

function removeTaskRow(btn){
  btn.parentElement.remove();
  checkPlanReady();
  // renumber placeholders
  document.querySelectorAll('.task-row-input').forEach((t,i)=>{
    t.placeholder=`任务 ${i+1}…`;
  });
}

function onTaskRowInput(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
  checkPlanReady();
}

function handleRowKey(e,el){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); addTaskRow(); }
}

function checkPlanReady(){
  const inputs=document.querySelectorAll('.task-row-input');
  const hasAny=Array.from(inputs).some(i=>i.value.trim().length>2);
  const btn=document.getElementById('btn-plan');
  btn.disabled=!hasAny;
  btn.classList.toggle('ready',hasAny);
}

// ── PLAN ──────────────────────────────────────────────────────────────────────
async function planAll(){
  const inputs=Array.from(document.querySelectorAll('.task-row-input'))
    .map(i=>i.value.trim()).filter(v=>v.length>2);
  if(!inputs.length) return;

  closePanel();

  // create skeleton projects
  const newProjects = inputs.map(name=>({
    id:'p_'+Date.now()+'_'+Math.random().toString(36).slice(2),
    name,
    steps:[],
    loading:true,
    open:true,
    createdAt:new Date().toISOString()
  }));
  projects.unshift(...newProjects);
  render();

  // plan each in parallel
  await Promise.all(newProjects.map(p=>planOne(p)));
  save();
}

async function planOne(proj){
  const system=`你是一个任务拆解助手。用户输入一个任务，你把它拆成3-7个具体可执行的步骤。

原则：
- 每步必须是具体的动作，不是模糊的方向
- 步骤按逻辑顺序排列
- 每步加一句简短的注释（为什么这步重要，或者具体怎么做）
- 第一步必须极其容易开始，消除启动阻力
- 不要超过7步，宁可少而精

严格返回JSON：
{"steps":[{"text":"步骤描述","note":"简短注释"}]}`;

  try{
    const raw=await callClaude(system,[{role:'user',content:`任务：${proj.name}`}]);
    const clean=raw.replace(/\`\`\`json|\`\`\`/g,'').trim();
    const parsed=JSON.parse(clean);
    proj.steps=parsed.steps.map(s=>({...s,done:false}));
  }catch(e){
    proj.steps=[{text:'开始这个任务',note:'从任何一个小动作开始',done:false}];
  }
  proj.loading=false;
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const empty=document.getElementById('empty');
  const projEl=document.getElementById('projects');
  empty.style.display=projects.length?'none':'flex';

  projEl.innerHTML=projects.map(p=>{
    const total=p.steps.length;
    const done=p.steps.filter(s=>s.done).length;
    const pct=total?Math.round(done/total*100):0;
    const isOpen=p.open!==false;

    return `<div class="project${isOpen?' open':''}" id="proj-${p.id}">
      <div class="project-head" onclick="toggleProject('${p.id}')">
        <div class="project-info">
          <div class="project-name">${escHtml(p.name)}</div>
          <div class="project-meta">
            <div class="project-progress">${done}/${total}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="project-progress">${pct}%</div>
          </div>
          <div class="project-actions" onclick="event.stopPropagation()">
            <button class="proj-action-btn" onclick="replanProject('${p.id}')">重新拆解</button>
            <button class="proj-action-btn danger" onclick="deleteProject('${p.id}')">删除</button>
          </div>
        </div>
        <div class="project-chevron">›</div>
      </div>
      <div class="steps-wrap">
        ${p.loading
          ? `<div class="steps-loading"><div class="spin"></div><span>拆解中…</span></div>`
          : p.steps.map((s,i)=>`
            <div class="step-item${s.done?' done':''}" id="step-${p.id}-${i}">
              <div class="step-check" onclick="toggleStep('${p.id}',${i})">
                <span class="check-icon">✓</span>
              </div>
              <div class="step-body">
                <div class="step-text">${escHtml(s.text)}</div>
                ${s.note?`<div class="step-note">${escHtml(s.note)}</div>`:''}
              </div>
              <div class="step-num">${i+1}</div>
            </div>
          `).join('')
        }
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleProject(id){
  const p=projects.find(p=>p.id===id);
  if(p) p.open=!p.open;
  render();
}

function toggleStep(projId, stepIdx){
  const p=projects.find(p=>p.id===projId);
  if(!p||!p.steps[stepIdx]) return;
  p.steps[stepIdx].done=!p.steps[stepIdx].done;
  save();
  render();
  const done=p.steps.filter(s=>s.done).length;
  if(done===p.steps.length && p.steps.length>0){
    showToast('🎉 全部完成！');
  }
}

function deleteProject(id){
  projects=projects.filter(p=>p.id!==id);
  save(); render();
}

async function replanProject(id){
  const p=projects.find(p=>p.id===id);
  if(!p) return;
  p.steps=[]; p.loading=true; p.open=true;
  render();
  await planOne(p);
  save();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function callClaude(system,messages){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,system,messages})
  });
  if(!res.ok) throw new Error('API '+res.status);
  const data=await res.json();
  return data.content.map(b=>b.text||'').join('');
}

load();
</script>
</body>
</html>
