<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Register Lab</title>
<style>
:root {
  --bg: #0f0f13;
  --surface: #17171f;
  --surface2: #1e1e2a;
  --border: #252535;
  --text: #e4e4f0;
  --muted: #6b6b8a;
  --dim: #353548;
  --green: #4ade80;
  --yellow: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --purple: #a78bfa;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size: 15px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
}
.scene-badge {
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
.scene-badge:hover { border-color: var(--blue); color: var(--blue); }
.mode-toggle {
  margin-left: auto;
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.mode-btn {
  font-size: 10px;
  font-family: 'Courier New', monospace;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 5px 10px;
  cursor: pointer;
  color: var(--muted);
  transition: background .15s, color .15s;
  border: none;
  background: none;
  white-space: nowrap;
}
.mode-btn.active {
  background: var(--surface);
  color: var(--text);
}

/* ── SETUP SCREEN ── */
#setup {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  gap: 20px;
}
.setup-title {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  font-family: 'Courier New', monospace;
  text-align: center;
}
.scene-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 420px;
}
.scene-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 14px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.scene-card:hover, .scene-card.selected {
  border-color: var(--blue);
  background: var(--surface2);
}
.scene-icon { font-size: 20px; }
.scene-name { font-size: 13px; font-weight: 600; }
.scene-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.start-btn {
  background: var(--blue);
  color: #0f0f13;
  border: none;
  border-radius: 10px;
  padding: 14px 32px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  opacity: .4;
  transition: opacity .15s, transform .1s;
  font-family: inherit;
  max-width: 420px;
  width: 100%;
}
.start-btn.ready { opacity: 1; }
.start-btn.ready:active { transform: scale(.97); }

/* ── CHAT SCREEN ── */
#chat-screen {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}
#chat-screen.active { display: flex; }

/* Context bar */
#ctx-bar {
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
#ctx-bar strong { color: var(--text); font-weight: 600; }
.ctx-dot { width:6px; height:6px; border-radius:50%; background: var(--green); flex-shrink:0; }
.ctx-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-width: 88%;
}
.msg-row.user { align-self: flex-end; align-items: flex-end; }
.msg-row.ai { align-self: flex-start; align-items: flex-start; }

.msg-who {
  font-size: 9px;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 0 4px;
}

.msg-bubble {
  padding: 10px 13px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
}
.msg-row.user .msg-bubble {
  background: var(--blue);
  color: #0f0f13;
  border-bottom-right-radius: 4px;
}
.msg-row.ai .msg-bubble {
  background: var(--surface2);
  color: var(--text);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}

/* Inline annotation (realtime mode) */
.annotation-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.65;
  max-width: 88%;
  align-self: flex-end;
}
.ann-title {
  font-size: 9px;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.ann-item {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  padding: 4px 0;
  border-bottom: 1px solid var(--dim);
}
.ann-item:last-child { border-bottom: none; }
.ann-tag {
  flex-shrink: 0;
  font-size: 9px;
  font-weight: 700;
  font-family: 'Courier New', monospace;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  margin-top: 1px;
}
.tag-good { background: rgba(74,222,128,.15); color: var(--green); }
.tag-stiff { background: rgba(251,191,36,.15); color: var(--yellow); }
.tag-alt { background: rgba(96,165,250,.15); color: var(--blue); }
.tag-nz { background: rgba(167,139,250,.15); color: var(--purple); }
.ann-text { color: var(--muted); }
.ann-text em { color: var(--text); font-style: normal; font-weight: 500; }

/* Summary block */
.summary-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  font-size: 12.5px;
  line-height: 1.7;
  max-width: 100%;
  align-self: stretch;
}
.summary-title {
  font-size: 9px;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.summary-body { color: var(--muted); }
.summary-body strong { color: var(--text); }

/* Typing indicator */
.typing-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  margin: 0 2px;
  animation: bounce .9s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* Round summary bar */
#round-bar {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  background: var(--surface);
}
.round-counter {
  font-size: 10px;
  font-family: 'Courier New', monospace;
  color: var(--muted);
}
.get-summary-btn {
  margin-left: auto;
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  letter-spacing: .05em;
  transition: border-color .15s, color .15s;
}
.get-summary-btn:hover { border-color: var(--purple); color: var(--purple); }
.new-scene-btn {
  font-size: 11px;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  transition: border-color .15s, color .15s;
}
.new-scene-btn:hover { border-color: var(--blue); color: var(--blue); }

/* Input */
#input-area {
  padding: 10px 12px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--bg);
}
#user-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color .15s;
}
#user-input::placeholder { color: var(--muted); }
#user-input:focus { border-color: var(--blue); }
#send-btn {
  width: 40px; height: 40px;
  background: var(--blue);
  border: none;
  border-radius: 10px;
  color: #0f0f13;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s, transform .1s;
}
#send-btn:disabled { opacity: .35; cursor: default; }
#send-btn:not(:disabled):active { transform: scale(.93); }
</style>
</head>
<body>

<header>
  <span class="logo">Register Lab</span>
  <span class="scene-badge" id="scene-label" style="display:none" onclick="resetToSetup()">↺ scene</span>
  <div class="mode-toggle" id="mode-toggle" style="display:none">
    <button class="mode-btn active" data-mode="realtime" onclick="setMode('realtime')">Live</button>
    <button class="mode-btn" data-mode="round" onclick="setMode('round')">Round</button>
  </div>
</header>

<!-- SETUP -->
<div id="setup">
  <div class="setup-title">Pick a scene</div>
  <div class="scene-grid">
    <div class="scene-card" data-scene="coffee" onclick="selectScene(this)">
      <div class="scene-icon">☕</div>
      <div class="scene-name">Coffee catch-up</div>
      <div class="scene-desc">Catching up with a mate. Relaxed, no agenda.</div>
    </div>
    <div class="scene-card" data-scene="vent" onclick="selectScene(this)">
      <div class="scene-icon">😤</div>
      <div class="scene-name">Venting session</div>
      <div class="scene-desc">Something annoying happened. Friend is listening.</div>
    </div>
    <div class="scene-card" data-scene="colleague" onclick="selectScene(this)">
      <div class="scene-icon">💼</div>
      <div class="scene-name">Colleague chat</div>
      <div class="scene-desc">Kitchen small talk or post-meeting debrief.</div>
    </div>
    <div class="scene-card" data-scene="plans" onclick="selectScene(this)">
      <div class="scene-icon">📅</div>
      <div class="scene-name">Making plans</div>
      <div class="scene-desc">Weekend plans, figuring out what to do.</div>
    </div>
  </div>
  <button class="start-btn" id="start-btn" onclick="startChat()" disabled>Start</button>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div id="ctx-bar">
    <div class="ctx-dot" id="ctx-dot"></div>
    <span id="ctx-text">–</span>
  </div>
  <div id="messages"></div>
  <div id="round-bar">
    <span class="round-counter" id="round-counter">0 exchanges</span>
    <button class="new-scene-btn" onclick="resetToSetup()">new scene</button>
    <button class="get-summary-btn" id="summary-btn" onclick="getSummary()">get summary</button>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Type in English…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>↑</button>
  </div>
</div>

<script>
const SCENES = {
  coffee: {
    label: '☕ coffee catch-up',
    context: 'You\'re catching up with your Kiwi friend Jamie at a café in Wellington. It\'s been a few weeks. Totally casual—no agenda, just chat.',
    systemBase: `You are Jamie, a 24-year-old Wellington local. Casual, warm, relaxed. You use NZ English naturally: "heaps", "keen", "sweet as", "nah", "reckon", "gonna", "yeah nah", "chur", contractions everywhere. Short sentences. React genuinely. Never sound formal. Keep replies to 2-4 sentences.`
  },
  vent: {
    label: '😤 venting session',
    context: 'Your friend Sam is listening while you vent about something that annoyed you this week. They\'re sympathetic but also a bit amused.',
    systemBase: `You are Sam, a close Wellington friend. You listen, react with casual empathy, ask follow-up questions, and occasionally poke gentle fun. Use NZ casual English: "ugh", "that's so annoying", "no way", "what happened", "oh damn", "fair enough". 2-3 sentences max. Natural, unpolished.`
  },
  colleague: {
    label: '💼 colleague chat',
    context: 'You\'re chatting with your coworker Alex in the kitchen. It\'s after a team meeting. Slightly more professional than friends, but still relaxed.',
    systemBase: `You are Alex, a Wellington office coworker. Friendly but slightly more polished than mates. Use workplace casual: "yeah totally", "how did that go", "not bad", "to be fair", "honestly", "pretty much". Still contractions, still human. 2-3 sentences.`
  },
  plans: {
    label: '📅 making plans',
    context: 'You and your friend Jess are trying to figure out what to do this weekend. Nothing is booked yet.',
    systemBase: `You are Jess, a Wellington friend. You're trying to make weekend plans—casual, indecisive, fun. Use phrases like "I'm down for that", "dunno", "maybe we could", "could be good", "sounds heaps fun", "nah let's do something else". Keep it natural and back-and-forth. 2-3 sentences.`
  }
};

let currentScene = null;
let feedbackMode = 'realtime'; // 'realtime' | 'round'
let chatHistory = [];
let exchangeCount = 0;
let isLoading = false;

// ── Scene selection ───────────────────────────────────────────────────────────
function selectScene(el) {
  document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  currentScene = el.dataset.scene;
  const btn = document.getElementById('start-btn');
  btn.disabled = false;
  btn.classList.add('ready');
}

function setMode(mode) {
  feedbackMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

function startChat() {
  if (!currentScene) return;
  const scene = SCENES[currentScene];
  chatHistory = [];
  exchangeCount = 0;

  document.getElementById('setup').style.display = 'none';
  const cs = document.getElementById('chat-screen');
  cs.classList.add('active');
  document.getElementById('scene-label').style.display = '';
  document.getElementById('scene-label').textContent = '↺ ' + scene.label;
  document.getElementById('mode-toggle').style.display = '';
  document.getElementById('messages').innerHTML = '';
  document.getElementById('round-counter').textContent = '0 exchanges';
  document.getElementById('user-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();

  // Context card
  const ctxText = document.getElementById('ctx-text');
  ctxText.innerHTML = `<strong>${scene.label.replace(/^.+ /,'')}</strong> — ${scene.context}`;

  // Opening line from AI
  getAIOpener();
}

function resetToSetup() {
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('chat-screen').classList.remove('active');
  document.getElementById('scene-label').style.display = 'none';
  document.getElementById('mode-toggle').style.display = 'none';
  document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('selected'));
  currentScene = null;
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.classList.remove('ready');
}

// ── Messaging ─────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = el.value.trim() === '';
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  exchangeCount++;
  document.getElementById('round-counter').textContent = `${exchangeCount} exchange${exchangeCount>1?'s':''}`;

  appendMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  if (feedbackMode === 'realtime') {
    await getAIReplyWithAnnotation(text);
  } else {
    await getAIReply();
  }
}

async function getAIOpener() {
  setLoading(true);
  const scene = SCENES[currentScene];
  const typing = appendTyping();
  try {
    const reply = await callClaude(
      scene.systemBase + '\n\nStart the conversation with a natural casual opener. One sentence or two. No greeting needed if it\'s mid-conversation energy.',
      [{ role: 'user', content: '(start)' }]
    );
    removeTyping(typing);
    appendMessage('ai', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping(typing);
    appendMessage('ai', 'Hey! (couldn\'t load — check connection)');
  }
  setLoading(false);
}

async function getAIReply() {
  setLoading(true);
  const scene = SCENES[currentScene];
  const typing = appendTyping();
  try {
    const reply = await callClaude(scene.systemBase, chatHistory);
    removeTyping(typing);
    appendMessage('ai', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping(typing);
    appendMessage('ai', '(API error)');
  }
  setLoading(false);
}

async function getAIReplyWithAnnotation(userText) {
  setLoading(true);
  const scene = SCENES[currentScene];
  const typing = appendTyping();

  const annotationSystem = `You are two things at once:
1. ${scene.systemBase}
2. A sharp English register coach who knows NZ casual speech.

Respond in strict JSON:
{
  "reply": "<your in-character reply as the friend>",
  "annotations": [
    { "tag": "good|stiff|alt|nz", "phrase": "<exact phrase from user's message>", "note": "<brief specific note>" }
  ]
}

Tag meanings:
- good: phrase is natural and colloquial ✓ (only flag 1-2 genuinely good choices)
- stiff: too formal/written for this context — give a casual alternative
- alt: not wrong but there's a more natural way to say it
- nz: chance to use a NZ-specific expression

Keep annotations to 2-4 items max. Be specific, not generic. If the user's English is already natural, say so briefly. Return ONLY valid JSON, no extra text.`;

  try {
    const raw = await callClaude(annotationSystem, chatHistory);
    removeTyping(typing);
    let parsed;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch(pe) {
      // fallback: treat as plain reply
      appendMessage('ai', raw);
      chatHistory.push({ role: 'assistant', content: raw });
      setLoading(false);
      return;
    }

    appendMessage('ai', parsed.reply);
    chatHistory.push({ role: 'assistant', content: parsed.reply });

    if (parsed.annotations && parsed.annotations.length > 0) {
      appendAnnotations(parsed.annotations, userText);
    }
  } catch(e) {
    removeTyping(typing);
    appendMessage('ai', '(API error)');
  }
  setLoading(false);
}

async function getSummary() {
  if (exchangeCount === 0) return;
  setLoading(true);
  const btn = document.getElementById('summary-btn');
  btn.textContent = 'loading…';

  const summarySystem = `You are a sharp English register coach. The user is a 22-year-old Chinese man learning NZ casual English. His academic English is near C1 but everyday register lags. Analyse the conversation.

Return JSON:
{
  "overall": "<1-2 sentence honest overall take>",
  "patterns": [
    { "type": "strength|gap|nz_tip", "note": "<specific, actionable observation>" }
  ],
  "phrases_to_steal": ["<3-5 NZ casual phrases from this conversation worth internalising>"]
}

Be direct. If something was good, say so specifically. If something was stiff, name the exact pattern. No generic praise. Return ONLY valid JSON.`;

  const conversationForSummary = chatHistory.filter(m => m.role === 'user').map(m => m.content).join('\n---\n');

  try {
    const raw = await callClaude(summarySystem, [{ role: 'user', content: `User's messages this round:\n${conversationForSummary}` }]);
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    appendSummary(parsed);
  } catch(e) {
    appendMessage('ai', '(Couldn\'t generate summary — try again)');
  }
  btn.textContent = 'get summary';
  setLoading(false);
}

// ── Render helpers ─────────────────────────────────────────────────────────────
function appendMessage(who, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${who}`;
  row.innerHTML = `
    <div class="msg-who">${who === 'user' ? 'you' : 'them'}</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  msgs.appendChild(row);
  scrollToBottom();
}

function appendTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = 'typing-row';
  row.innerHTML = `
    <div class="msg-who">them</div>
    <div class="msg-bubble" style="padding:12px 16px">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>`;
  msgs.appendChild(row);
  scrollToBottom();
  return row;
}

function removeTyping(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

function appendAnnotations(anns, userText) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'annotation-wrap';

  const tagLabels = { good:'✓ natural', stiff:'too stiff', alt:'better alt', nz:'NZ style' };
  const tagClasses = { good:'tag-good', stiff:'tag-stiff', alt:'tag-alt', nz:'tag-nz' };

  let html = `<div class="ann-title">Register check</div>`;
  anns.forEach(a => {
    const tc = tagClasses[a.tag] || 'tag-alt';
    const tl = tagLabels[a.tag] || a.tag;
    html += `<div class="ann-item">
      <span class="ann-tag ${tc}">${tl}</span>
      <div class="ann-text"><em>"${escapeHtml(a.phrase)}"</em> — ${escapeHtml(a.note)}</div>
    </div>`;
  });

  wrap.innerHTML = html;
  msgs.appendChild(wrap);
  scrollToBottom();
}

function appendSummary(data) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'summary-wrap';

  const typeLabels = { strength:'✓ strength', gap:'△ gap', nz_tip:'NZ tip' };
  const typeColors = { strength: 'var(--green)', gap: 'var(--yellow)', nz_tip: 'var(--purple)' };

  let html = `<div class="summary-title">Round summary</div>
    <div class="summary-body">${escapeHtml(data.overall)}</div>`;

  if (data.patterns?.length) {
    html += `<div style="margin-top:12px;font-size:9px;color:var(--muted);font-family:'Courier New',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Patterns</div>`;
    data.patterns.forEach(p => {
      const color = typeColors[p.type] || 'var(--muted)';
      const label = typeLabels[p.type] || p.type;
      html += `<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--dim);font-size:12px">
        <span style="font-size:9px;font-family:'Courier New',monospace;color:${color};font-weight:700;text-transform:uppercase;flex-shrink:0;margin-top:2px">${escapeHtml(label)}</span>
        <span style="color:var(--muted)">${escapeHtml(p.note)}</span>
      </div>`;
    });
  }

  if (data.phrases_to_steal?.length) {
    html += `<div style="margin-top:12px;font-size:9px;color:var(--muted);font-family:'Courier New',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Steal these phrases</div>`;
    data.phrases_to_steal.forEach(ph => {
      html += `<div style="font-size:12.5px;color:var(--blue);font-family:'Courier New',monospace;padding:3px 0">"${escapeHtml(ph)}"</div>`;
    });
  }

  wrap.innerHTML = html;
  msgs.appendChild(wrap);
  scrollToBottom();
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
}

function setLoading(v) {
  isLoading = v;
  const dot = document.getElementById('ctx-dot');
  dot.classList.toggle('loading', v);
  const input = document.getElementById('user-input');
  input.disabled = v;
  if (!v) input.focus();
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── API ────────────────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: systemPrompt,
      messages: messages
    })
  });
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  return data.content.map(b => b.text || '').join('');
}
